apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Test Pipeline

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    steps:
      - name: Checkout code
        uses: https://github.com/cloudbees-io/checkout@v1

      - name: Install dependencies
        uses: docker://node:20-alpine
        run: npm ci

      - name: Run tests
        uses: docker://node:20-alpine
        run: npm test
