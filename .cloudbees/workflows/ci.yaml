apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    steps:
      - name: Checkout code
        uses: https://github.com/cloudbees-io/checkout@v1

      - name: Install dependencies
        uses: docker://node:20-alpine
        run: npm ci

      - name: Run tests
        uses: docker://node:20-alpine
        run: npm test

      - name: Publish test results
        uses: https://github.com/cloudbees-io/publish-test-results@v2
        with:
          test-type: JEST
          results-path: test-results/junit.xml

      - name: Publish test evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Test Results

            - **Status**: ✅ All tests passed
            - **Framework**: Jest + Supertest
            - **Node Version**: 20
            - **Commit**: ${{ cloudbees.scm.sha }}

            Test results published successfully.

  build:
    needs: test
    steps:
      - name: Checkout code
        uses: https://github.com/cloudbees-io/checkout@v1

      - name: Configure Docker credentials
        uses: https://github.com/cloudbees-io/configure-oci-credentials@v1
        with:
          registry: index.docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push with Kaniko (SHA tag)
        uses: https://github.com/cloudbees-io/kaniko@v1
        with:
          destination: ${{ secrets.DOCKER_USERNAME }}/bookstore-app:${{ cloudbees.scm.sha }}
          context: .
          dockerfile: Dockerfile

      - name: Build and push with Kaniko (latest tag)
        uses: https://github.com/cloudbees-io/kaniko@v1
        with:
          destination: ${{ secrets.DOCKER_USERNAME }}/bookstore-app:latest
          context: .
          dockerfile: Dockerfile

      - name: Publish build evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Container Build Complete

            - **Image**: `${{ secrets.DOCKER_USERNAME }}/bookstore-app`
            - **Tags**: `${{ cloudbees.scm.sha }}`, `latest`
            - **Registry**: Docker Hub
            - **Commit**: ${{ cloudbees.scm.sha }}

            ### Pull Command
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-app:${{ cloudbees.scm.sha }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-app:latest
            ```
